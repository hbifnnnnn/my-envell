<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Envell</title>
    
    <!-- Добавление иконки для вкладки -->
    <link rel="icon" type="image/png" href="logo.png">
    <link rel="apple-touch-icon" href="logo.png">
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --primary-blue: #2d4070;
            --dark-blue: #1a2332;
            --bg-color: #f5f7fa;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            overflow-x: hidden;
        }

        /* --- Шапка (темно-синяя) --- */
        header {
            background: var(--dark-blue);
            padding: 15px 40px;
            display: flex;
            align-items: center;
            position: relative;
        }

        .header-logo {
            display: inline-block;
            cursor: default;
        }

        .header-logo img {
            height: 35px;
            display: block;
        }

        /* --- Главный экран --- */
        .hero {
            position: relative;
            width: 100%;
            min-height: 80vh;
            background-image: url('pack.png');
            background-size: cover;
            background-position: center bottom;
            display: flex;
            align-items: center;
            padding: 0 8%;
            overflow: hidden;
        }

        /* Плавный переход сверху (от темно-синей шапки) */
        .hero::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 150px;
            background: linear-gradient(to bottom, var(--dark-blue), transparent);
            z-index: 1;
            pointer-events: none;
        }

        /* Плавный переход снизу (в белый фон) */
        .hero::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 200px;
            background: linear-gradient(to bottom, transparent, #ffffff);
            z-index: 1;
            pointer-events: none;
        }

        /* Здание справа (смещено выше и левее) */
        .hero-building-img {
            position: absolute;
            right: 5%;      
            left: auto; 
            bottom: 10px;   
            height: 100%;   
            width: auto;
            z-index: 0;
            pointer-events: none;
            object-fit: contain;
        }

        .hero-content {
            position: relative;
            z-index: 2;
            max-width: 600px;
            margin-top: -50px;
        }

        .online-badge {
            display: inline-block;
            background: rgba(25, 35, 55, 0.85);
            color: #fff;
            font-size: 13px;
            font-weight: 600;
            padding: 6px 16px;
            border-radius: 4px;
            margin-bottom: 15px;
            animation: fadeInUp 0.6s ease-out;
        }

        .hero-title {
            font-size: 80px;
            color: #ffffff;
            font-weight: 800;
            text-shadow: 0 4px 20px rgba(0,0,0,0.2);
            margin-bottom: 10px;
            animation: fadeInUp 0.8s ease-out;
        }

        .hero-subtitle {
            font-size: 28px;
            color: #ffffff;
            font-weight: 400;
            text-shadow: 0 2px 10px rgba(0,0,0,0.3);
            animation: fadeInUp 1s ease-out;
        }

        /* --- Блок с серверами --- */
        .servers-section {
            padding: 60px 8% 120px;
            background: #ffffff;
            text-align: center;
            position: relative;
            z-index: 2;
        }

        .servers-section h2 {
            font-size: 36px;
            color: #1a2332;
            margin-bottom: 50px;
            font-weight: 700;
        }

        .server-cards {
            display: flex;
            justify-content: center;
            gap: 50px;
            flex-wrap: wrap;
        }

        .server-card {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-decoration: none;
            background: #fafbfc;
            padding: 40px 30px 35px;
            border-radius: 20px;
            width: 320px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 20px rgba(0,0,0,0.04);
            border: 1px solid rgba(0,0,0,0.02);
        }

        .server-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 15px 40px rgba(0,0,0,0.08);
            background: #ffffff;
        }

        .server-card img {
            width: 160px;
            height: 160px;
            border-radius: 20px;
            object-fit: cover;
            margin-bottom: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            transition: transform 0.3s ease;
        }

        .server-card:hover img {
            transform: scale(1.05);
        }

        .server-card h3 {
            font-size: 28px;
            color: #1a2332;
            margin-bottom: 10px;
            font-weight: 700;
        }

        .server-card p {
            font-size: 16px;
            color: #6c7a99;
            line-height: 1.5;
        }

        /* --- Подвал --- */
        footer {
            position: relative;
            background: var(--dark-blue);
            padding: 60px 8% 40px;
            text-align: center;
        }

        /* Плавный переход от белого к темно-синему подвалу */
        footer::before {
            content: '';
            position: absolute;
            top: -120px;
            left: 0;
            width: 100%;
            height: 120px;
            background: linear-gradient(to bottom, #ffffff 0%, var(--dark-blue) 100%);
            z-index: 0;
            pointer-events: none;
        }

        footer p {
            color: #8b9bb5;
            margin-bottom: 25px;
            font-size: 16px;
            font-weight: 500;
            position: relative;
            z-index: 1;
        }

        .social-links {
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
            position: relative;
            z-index: 1;
        }

        .social-links a {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 50px;
            height: 50px;
            background: rgba(255,255,255,0.08);
            color: #fff;
            border-radius: 50%;
            font-size: 22px;
            transition: all 0.3s ease;
            text-decoration: none;
        }

        .social-links a:hover {
            background: var(--primary-blue);
            transform: scale(1.1);
        }

        /* --- Анимации --- */
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* --- Адаптивность --- */
        @media (max-width: 900px) {
            .hero-title { font-size: 50px; }
            .hero-building-img { height: 80%; }
            .server-cards { gap: 30px; }
        }

        @media (max-width: 600px) {
            header { padding: 10px 20px; }
            .hero-title { font-size: 34px; }
            .hero-subtitle { font-size: 18px; }
            .hero-building-img { display: none; }
            .servers-section { padding: 40px 5% 100px; }
            .server-card { width: 100%; max-width: 340px; }
            .server-card img { width: 140px; height: 140px; }
            footer { padding: 40px 5% 30px; }
            footer::before { height: 50px; top: -50px; }
        }
    </style>
</head>
<body>

    <!-- Шапка (Темно-синяя) - без обводок -->
    <header>
        <div class="header-logo">
            <img src="logo.png" alt="Logo">
        </div>
    </header>

    <!-- Главная секция -->
    <section class="hero">
        <!-- Картинка-здание справа, смещена выше и левее -->
        <img src="left_pack.png" alt="Building" class="hero-building-img">

        <div class="hero-content">
            <div class="online-badge">
                Онлайн <span id="online-count">0</span> из 198
            </div>
            <h1 class="hero-title">My Envell</h1>
            <p class="hero-subtitle">Приятной игры</p>
        </div>
    </section>

    <!-- Секция с двумя серверами -->
    <div class="servers-section">
        <h2>Выбери свой сервер</h2>
        <div class="server-cards">
            <!-- Карточка 1: Анархия (Ссылка изменена) -->
            <a href="https://envell-anarchy.easydonate.ru/" class="server-card" target="_blank">
                <img src="Анархия.png" alt="Анархия">
                <h3>Анархия</h3>
                <p>Полный хаос и свобода действий. Никаких правил и ограничений</p>
            </a>

            <!-- Карточка 2: СМП (Ссылка изменена) -->
            <a href="https://envell-smp.easydonate.ru/" class="server-card" target="_blank">
                <img src="смп.png" alt="СМП">
                <h3>СМП</h3>
                <p>Сервер без грифа. Строй, развивайся и наслаждайся игрой в безопасности</p>
            </a>
        </div>
    </div>

    <!-- Подвал -->
    <footer>
        <p>Наши сервисы и сообщества</p>
        <div class="social-links">
            <a href="https://t.me/hbifn_corner" target="_blank" aria-label="Telegram"><i class="fab fa-telegram-plane"></i></a>
            <a href="https://www.youtube.com/@hbifn" target="_blank" aria-label="YouTube"><i class="fab fa-youtube"></i></a>
            <a href="https://discord.gg/yfzapgYmxP" target="_blank" aria-label="Discord"><i class="fab fa-discord"></i></a>
        </div>
    </footer>

    <!-- Скрипт для подсчета онлайна -->
    <script>
        const ipAddresses = [
            '89.248.236.141:27146',
            '89.248.236.143:27130',
            '89.248.236.143:27155'
        ];

        const onlineElement = document.getElementById('online-count');

        async function fetchOnline() {
            let totalPlayers = 0;
            for (const ip of ipAddresses) {
                try {
                    const response = await fetch(`https://api.mcsrvstat.us/2/${ip}`);
                    const data = await response.json();
                    if (data.online && data.players) {
                        totalPlayers += data.players.online || 0;
                    }
                } catch (error) {
                    console.error(`Ошибка при проверке сервера ${ip}:`, error);
                }
            }
            if (onlineElement) {
                onlineElement.textContent = totalPlayers;
            }
        }

        fetchOnline();
        setInterval(fetchOnline, 60000);
    </script>

</body>
</html>
